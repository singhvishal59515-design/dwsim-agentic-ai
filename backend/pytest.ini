[pytest]
# DWSIM Agentic AI — pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short traceback, verbose output
addopts = -v --tb=short

# Timeout for any single test (seconds)
# Override per-test with @pytest.mark.timeout(N)
timeout = 120

# Marks
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    dwsim: marks tests that require a live DWSIM installation
    llm: marks tests that make real LLM API calls
    integration: marks cross-module integration tests

# Log level during test runs
log_cli = false
log_cli_level = WARNING
log_level = WARNING

# Filter noisy warnings from third-party libraries
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:matplotlib.*
    ignore::UserWarning:reportlab.*
