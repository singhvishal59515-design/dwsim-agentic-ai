    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px;
  }

  h1 {
    color: #e2e8f0;
    font-size: 1.45rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .subtitle {
    color: #64748b;
    font-size: 0.78rem;
    margin-bottom: 36px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ─── SVG wrapper ─────────────────────────────────────── */
  .diagram-wrap {
    width: 100%;
    max-width: 1300px;
    background: #0d1120;
    border: 1px solid #1e2a45;
    border-radius: 16px;
    padding: 32px 24px;
    overflow: hidden;
  }

  svg text { font-family: 'Segoe UI', 'Inter', sans-serif; }

  /* ─── Glow keyframes ──────────────────────────────────── */
  @keyframes pulse-cyan   { 0%,100%{filter:drop-shadow(0 0 6px #06b6d4)} 50%{filter:drop-shadow(0 0 16px #06b6d4)} }
  @keyframes pulse-purple { 0%,100%{filter:drop-shadow(0 0 6px #a855f7)} 50%{filter:drop-shadow(0 0 16px #a855f7)} }
  @keyframes pulse-green  { 0%,100%{filter:drop-shadow(0 0 6px #22c55e)} 50%{filter:drop-shadow(0 0 16px #22c55e)} }
  @keyframes pulse-amber  { 0%,100%{filter:drop-shadow(0 0 6px #f59e0b)} 50%{filter:drop-shadow(0 0 16px #f59e0b)} }
  @keyframes pulse-rose   { 0%,100%{filter:drop-shadow(0 0 6px #f43f5e)} 50%{filter:drop-shadow(0 0 16px #f43f5e)} }
  @keyframes dash-flow { to { stroke-dashoffset: -20; } }

  .glow-cyan   { animation: pulse-cyan   3s ease-in-out infinite; }
  .glow-purple { animation: pulse-purple 3s ease-in-out infinite; }
  .glow-green  { animation: pulse-green  3s ease-in-out infinite; }
  .glow-amber  { animation: pulse-amber  3s ease-in-out infinite; }
  .glow-rose   { animation: pulse-rose   3s ease-in-out infinite; }

  .flow-arrow { animation: dash-flow 1.2s linear infinite; stroke-dasharray: 8 4; }

  /* legend */
  .legend { display:flex; gap:24px; margin-top:20px; flex-wrap:wrap; justify-content:center; }
  .legend-item { display:flex; align-items:center; gap:7px; font-size:0.72rem; color:#94a3b8; }
  .legend-dot { width:12px; height:12px; border-radius:3px; }
</style>
